name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install ruff mypy -r requirements.txt

      - name: Ruff lint
        run: ruff check src/python/ tests/

      - name: Mypy type-check
        run: mypy src/python/ --ignore-missing-imports

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint
    env:
      SPEECHMATICS_API_KEY: test-key-ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src/python --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  validate-dashboard:
    name: Validate JS dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Check JS syntax
        run: node --check src/js/dashboard.js src/js/audio_recorder.js
